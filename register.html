<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Team - BG TOURNAMENT</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<h1>Register Your Team</h1>

<form>
<input type="text" placeholder="Team Name" required><br><br>

<input type="text" placeholder="Team Leader Name" required><br><br>

<input type="text" placeholder="Leader Free Fire UID" required><br><br>

<input type="text" placeholder="Instagram Username" required><br><br>

<input type="text" placeholder="Player 2 UID"><br><br>

<input type="text" placeholder="Player 3 UID"><br><br>

<input type="text" placeholder="Player 4 UID"><br><br>

<input type="file" accept="image/*"><br><br>

<button type="submit">Register Team</button>
</form>

</body>
</html>
